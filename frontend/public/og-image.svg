<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" aria-hidden="true">
  <defs>
    <style>
      .title { font-family: Georgia, "Times New Roman", serif; font-style: italic; fill: #ffffff; }
      .tag   { font-family: "Brush Script MT", "Segoe Script", cursive; fill: #ffffff; }
      .sub   { font-family: Inter, system-ui, Arial, sans-serif; fill: #dfe9ec; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="#658086"/>
  <!-- Salt shaker -->
  <g transform="translate(870 140) rotate(32)" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M60 90 L60 300 Q60 320 80 320 L200 320 Q220 320 220 300 L220 90"/>
    <path d="M60 90 Q60 60 80 60 L200 60 Q220 60 220 90"/>
    <path d="M70 40 L210 40"/>
    <path d="M80 0 Q80 -20 100 -20 L180 -20 Q200 -20 200 0 L200 40 L80 40 Z"/>
    <circle cx="110" cy="10" r="5" fill="#ffffff" stroke="none"/>
    <circle cx="140" cy="0"  r="5" fill="#ffffff" stroke="none"/>
    <circle cx="170" cy="10" r="5" fill="#ffffff" stroke="none"/>
    <circle cx="125" cy="25" r="5" fill="#ffffff" stroke="none"/>
    <circle cx="155" cy="25" r="5" fill="#ffffff" stroke="none"/>
  </g>
  <circle cx="1060" cy="70" r="7" fill="#ffffff"/>
  <circle cx="1100" cy="40" r="5" fill="#ffffff"/>
  <circle cx="1030" cy="40" r="4" fill="#ffffff"/>
  <circle cx="1130" cy="90" r="4" fill="#ffffff"/>

  <text class="title" x="90" y="300" font-size="140" font-weight="600">seasoning</text>
  <text class="tag"   x="100" y="370" font-size="60">A pinch of you</text>
  <text class="sub"   x="92"  y="470" font-size="36">Your recipes, seasoned just right.</text>
  <text class="sub"   x="92"  y="520" font-size="28" opacity="0.85">Save, adjust and share what you cook.</text>
